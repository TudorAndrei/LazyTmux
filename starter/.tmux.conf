# LazyTmux starter.
#
# This file is intended for a separate LazyTmux starter repository, similar to
# LazyVim's starter repo. Users can clone that starter as their tmux config and
# this file will bootstrap the main LazyTmux distribution automatically.

if-shell 'command -v luajit >/dev/null 2>&1 || command -v lua >/dev/null 2>&1' {
  set-environment -g LAZYTMUX_REPO "https://github.com/TudorAndrei/LazyTmux.git"
  set-environment -gF LAZYTMUX_HOME "#{E:HOME}/.local/share/lazytmux/LazyTmux"
  if-shell -b 'test -d "$HOME/.local/share/lazytmux/LazyTmux/.git" || git clone --filter=blob:none "$LAZYTMUX_REPO" "$HOME/.local/share/lazytmux/LazyTmux"' \
    'source-file -F "#{E:LAZYTMUX_HOME}/lazytmux.tmux"' \
    'display-message "LazyTmux bootstrap failed. Check git/network access."'
} {
  display-message "LazyTmux requires Lua 5.1+ or LuaJIT on PATH; install one and reload."
}
