name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install --yes tmux
      - name: Lint
        run: mise exec -- hk check --all
      - name: Behavioral tests
        run: mise run test
